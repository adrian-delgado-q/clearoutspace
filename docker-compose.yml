services:
  # ── PocketBase (CMS + API) ────────────────────────────────────────────────────
  pocketbase:
    build:
      context: ./pocketbase
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - pb_data:/pb/pb_data

  # ── Next.js App ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      PB_INTERNAL_URL: http://localhost:8090
    depends_on:
      - pocketbase

  # ── Caddy (VPS only — enable with: docker compose --profile vps up) ───────────
  caddy:
    profiles:
      - vps
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    env_file: .env
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - pocketbase

volumes:
  pb_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
