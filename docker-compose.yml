# ClearoutSpace – Docker Compose (VPS)
#
# ── First-time setup ──────────────────────────────────────────────────────────
#   1. Copy .env.example → .env and fill in every value
#   2. Replace GITHUB_USERNAME below with your GitHub username/org
#   3. sudo docker compose pull && sudo docker compose up -d
#
# Nginx (nginx.conf.example) proxies clearoutspace.ca → 127.0.0.1:3000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-clearspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-clearspace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clearspace}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    # ↓↓  Replace GITHUB_USERNAME with your GitHub username or org  ↓↓
    image: ghcr.io/GITHUB_USERNAME/clearoutspace:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # exposed only to localhost; nginx reverse-proxies it
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
