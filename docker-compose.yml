services:
  app:
    image: ghcr.io/adrian-delgado-q/clearoutspace:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env

  nginx:
    profiles:
      - vps
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/clearoutspace.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app

volumes: {}
