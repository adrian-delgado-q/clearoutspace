# ClearoutSpaces – Docker Compose
#
# ── Local dev ─────────────────────────────────────────────────────────────────
#   docker compose up -d
#   → http://localhost:3000
#
# ── VPS / production (with nginx) ────────────────────────────────────────────
#   docker compose --profile vps up -d
#   → nginx listens on 80/443, proxies to app on internal network
#
# ── First-time setup ──────────────────────────────────────────────────────────
#   cp .env.example .env   # fill in secrets
#   docker compose pull && docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-clearspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-clearspace}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clearspace}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/adrian-delgado-q/clearoutspace:latest
    restart: unless-stopped
    ports:
      - "3000:3000"   # http://localhost:3000  (dev)
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  # ── Nginx reverse-proxy (VPS only) ──────────────────────────────────────────
  # Activated with:  docker compose --profile vps up -d
  # On the VPS nginx handles SSL termination and routes clearoutspace.ca → app.
  nginx:
    profiles:
      - vps
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/clearoutspace.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro  # certbot webroot for ACME challenge
    depends_on:
      - app

volumes:
  pgdata:
    labels:
      backup: daily
      retention: 30d