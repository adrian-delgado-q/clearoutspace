# ── Production (VPS + Cloudflare Tunnel) ──────────────────────────────────────
# Pulls pre-built images from GHCR. TLS is handled by Cloudflare — no reverse
# proxy needed on the server.
#
# Tunnel routes (configured in the Cloudflare dashboard):
#   clearoutspaces.ca      → http://localhost:3000
#   cms.clearoutspaces.ca  → http://localhost:8090
#
# Required .env values: GHCR_USERNAME, IMAGE_TAG, TUNNEL_TOKEN
# On the VPS these live in /opt/clearoutspaces/.env (root-owned, 640).
# CI appends GHCR_USERNAME and IMAGE_TAG to that file on each deploy.

services:
  pocketbase:
    image: ghcr.io/${GHCR_USERNAME}/clearoutspace-pocketbase:${IMAGE_TAG:-latest}
    restart: unless-stopped
    network_mode: host
    env_file: /opt/clearoutspaces/.env
    volumes:
      - pb_data:/pb/pb_data

  app:
    image: ghcr.io/${GHCR_USERNAME}/clearoutspace:${IMAGE_TAG:-latest}
    restart: unless-stopped
    network_mode: host
    env_file: /opt/clearoutspaces/.env
    environment:
      # Reaches PocketBase over loopback — works because both use network_mode: host
      PB_INTERNAL_URL: http://localhost:8090
    depends_on:
      - pocketbase

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    env_file: /opt/clearoutspaces/.env
    depends_on:
      - app
      - pocketbase

volumes:
  pb_data:
    driver: local
