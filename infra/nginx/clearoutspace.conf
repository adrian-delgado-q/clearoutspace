# ClearoutSpaces – nginx VPS reverse-proxy (Docker)
# ─────────────────────────────────────────────────────────────────────────────
# DEPLOY (first time on VPS, with DNS already pointing to this server)
#
#   1.  docker compose --profile vps up -d
#
#   2.  Issue TLS certificate (certbot runs on the host, nginx serves challenge):
#       sudo certbot certonly --webroot \
#           -w /var/www/certbot \
#           -d clearoutspace.ca \
#           -d www.clearoutspace.ca
#
#   3.  docker compose --profile vps restart nginx
#
# RENEWAL (auto via cron / systemd timer – certbot renews, nginx picks it up):
#   sudo certbot renew --quiet
#   docker compose --profile vps exec nginx nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

# Route traffic to the Next.js Docker service by name
upstream nextjs {
    server app:3000;
    keepalive 32;
}

# ── Redirect www → apex (HTTP) ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name www.clearoutspace.ca;
    return 301 https://clearoutspace.ca$request_uri;
}

# ── Redirect www → apex (HTTPS) ──────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;
    server_name www.clearoutspace.ca;

    ssl_certificate     /etc/letsencrypt/live/clearoutspace.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearoutspace.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://clearoutspace.ca$request_uri;
}

# ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name clearoutspace.ca;

    # Certbot webroot – served from the host path /var/www/certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;
    server_name clearoutspace.ca;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/clearoutspace.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearoutspace.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml
        application/font-woff2;

    client_max_body_size 20M;

    # ── Cert renewal while HTTPS is live ─────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Next.js static assets — immutable, 1-year cache ──────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Static file types — 1-week cache ─────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2|woff|ttf)$ {
        proxy_pass http://nextjs;
        expires    7d;
        add_header Cache-Control "public";
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
