upstream nextjs {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.clearoutspaces.ca;
    return 301 https://clearoutspaces.ca$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;
    server_name www.clearoutspaces.ca;

    ssl_certificate     /etc/letsencrypt/live/clearoutspaces.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearoutspaces.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://clearoutspaces.ca$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name clearoutspaces.ca;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;
    server_name clearoutspaces.ca;

    ssl_certificate     /etc/letsencrypt/live/clearoutspaces.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearoutspaces.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml
        application/font-woff2;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /_next/static/ {
        proxy_pass http://nextjs;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2|woff|ttf)$ {
        proxy_pass http://nextjs;
        expires    7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
