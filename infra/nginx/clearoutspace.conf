# ClearoutSpace – nginx reverse-proxy
# ─────────────────────────────────────────────────────────────────────────────
# INSTALL
#   sudo cp infra/nginx/clearoutspace.conf /etc/nginx/sites-available/clearoutspace
#   sudo ln -s /etc/nginx/sites-available/clearoutspace /etc/nginx/sites-enabled/clearoutspace
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (run once after DNS is pointed at this server)
#   sudo certbot --nginx -d clearoutspace.ca -d www.clearoutspace.ca
# ─────────────────────────────────────────────────────────────────────────────

# Redirect www → apex over HTTPS
server {
    listen 80;
    listen 443 ssl;
    server_name www.clearoutspace.ca;

    ssl_certificate     /etc/letsencrypt/live/clearoutspace.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearoutspace.ca/privkey.pem;

    return 301 https://clearoutspace.ca$request_uri;
}

# Redirect plain HTTP → HTTPS (apex)
server {
    listen 80;
    server_name clearoutspace.ca;
    return 301 https://clearoutspace.ca$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name clearoutspace.ca;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/clearoutspace.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clearoutspace.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin" always;

    # ── Next.js app (Docker container bound to 127.0.0.1:3000) ───────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Next.js static assets — cache immutably ───────────────────────────────
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:3000;
        expires          1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Public folder assets — cache for 1 week ───────────────────────────────
    location /public/ {
        proxy_pass       http://127.0.0.1:3000;
        expires          7d;
        add_header Cache-Control "public";
    }

    client_max_body_size 20M;
}
