name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/clearoutspace
  PB_IMAGE_NAME: ${{ github.repository_owner }}/clearoutspace-pocketbase

jobs:
  # ── 0. Run test suite ────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── 1. Build Docker images and push to GitHub Container Registry ─────────────
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Next.js app
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Next.js app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for PocketBase
        id: meta-pb
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PB_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push PocketBase
        uses: docker/build-push-action@v5
        with:
          context: ./pocketbase
          push: true
          tags: ${{ steps.meta-pb.outputs.tags }}
          labels: ${{ steps.meta-pb.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. SSH into server and redeploy with docker compose ──────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_TAG,GHCR_USERNAME
          script: |
            set -e
            cd ~/clearoutspace

            # Secrets live in /opt/clearoutspaces/.env (root-owned on the VPS).
            # Update the dynamic deploy vars (remove stale values first to avoid duplicates).
            sed -i '/^GHCR_USERNAME=/d;/^IMAGE_TAG=/d' /opt/clearoutspaces/.env
            printf 'GHCR_USERNAME=%s\nIMAGE_TAG=%s\n' "${GHCR_USERNAME}" "${IMAGE_TAG}" >> /opt/clearoutspaces/.env

            # --env-file makes compose resolve ${VAR} substitutions in the compose file itself
            # (e.g. image names). env_file: in services handles runtime injection inside containers.
            echo "Pulling images for tag ${IMAGE_TAG}…"
            docker compose --env-file /opt/clearoutspaces/.env -f docker/compose.prod.yml pull

            echo "Restarting services…"
            docker compose --env-file /opt/clearoutspaces/.env -f docker/compose.prod.yml up -d --remove-orphans

            echo "Pruning old images…"
            docker image prune -f

            echo "✅  Deploy complete (tag: ${IMAGE_TAG})"
